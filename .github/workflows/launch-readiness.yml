name: Launch readiness

on:
  pull_request:
  push:
    branches:
      - master
      - "launch/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-launch.txt

      - name: Run launch-rule tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify source-data invariants
        run: python scripts/verify_source_data.py

      - name: Build reduced release
        env:
          PARADISIO_BUILD_DATE: "2026-08-01"
        run: python paradisio_app/build.py

      - name: Verify release artifact
        run: python scripts/verify_release.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build-and-verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
